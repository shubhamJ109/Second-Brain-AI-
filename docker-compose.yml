version: "3.9"

services:

  # ── PostgreSQL + pgvector ───────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16   # official image with pgvector pre-installed
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: secondbrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/secondbrain
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGINS: http://localhost:3000
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app   # hot-reload in dev (uvicorn --reload)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  pgdata:
